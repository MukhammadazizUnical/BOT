services:
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: always
    depends_on:
      app:
        condition: service_started
    ports:
      - '9093:9093'
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: always
    depends_on:
      app:
        condition: service_started
      alertmanager:
        condition: service_healthy
    ports:
      - '9090:9090'
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  grafana:
    image: grafana/grafana:11.2.0
    restart: always
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - '${GRAFANA_HOST_PORT:-3001}:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docs/grafana_broadcast_observability_dashboard.json:/var/lib/grafana/dashboards/grafana_broadcast_observability_dashboard.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
