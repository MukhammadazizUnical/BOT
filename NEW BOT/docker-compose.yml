services:
  app:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      - BOT_ROLE=app
      - TZ=UTC-5
    ports:
      - '3011:3010'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 3010

  worker:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      - BOT_ROLE=worker
      - TZ=UTC-5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq app.worker.WorkerSettings

  bot:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      - BOT_ROLE=app
      - TZ=UTC-5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.bot_runner

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1111
      - POSTGRES_DB=tgbot
      - TZ=UTC-5
      - PGTZ=UTC-5
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tgbot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: always
    environment:
      - TZ=UTC-5
    ports:
      - '6381:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  postgres_data:
